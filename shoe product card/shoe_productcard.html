<style>
    body{
        width:100%;
        height:100vh;
        display:flex;
        align-items:center;
        justify-content:center;
        color:white;
        font-family:"muli"
    }
 .root{
    width:800px;
    height:600px;
     display:flex;
        align-items:center;
        justify-content:center;
        background-color: #252831;
        background:url(bg.png)
 }
 .product{

    height:400px;
     display:flex;
     
 }  
 .left{
    width:55%;

     background-color:rgb(214,93,49);
 } 
.right{
    width:45%;
  
    padding:25px;
 } 
 .content{
   margin-top:80px; 
 }
 .logo{
    color:rgb(214,93,49);

    font-weight:600;
 }
 .winter{
     font-size:20px;

     font-size:28px;

 }
 .price{
    display:flex;
gap:35px;
margin-top:20px;

 }
 .price1{
    font-size:20px;
    font-weight:600
 }
 .price2{
    font-size:20px;
    font-weight:600;

 }
 .size{
display:flex;
gap:25px;
align-items:center;
 }
 .size_num span{
margin-right:29px;
 }
 .yellow{
    width:15px;
    height:15px;

  .black{

    height:15px;
    background-color:black;
    border-radius:50%;
 }
  .blue{

    height:15px;

    border-radius:50%;
 }
 .color{
    display: flex;
    align-items: center;
    gap:40px;
    margin-top:25px;
 }
 .color-box{
    display:flex;
    gap:35px;

 }
 .s{
    font-size: 12px;
 }
 .wm{
    display: flex;
    flex-direction:column;
    line-height:20px;
 }
 .footer{
    display:flex;
    gap:50px;
    margin-left:20px;
    margin-top:20px;
 }
 .footer span{
    font-size:12px;
 }
 .show{
    position:absolute;
    top:50px;
    left:-85px;
    width:470px;
 }

</div>
</div>

</div>

    <div class="size_num"><span>7</span><span>8</span><span>9</span><span>10</span><span>11</span></div>
</div>
<div class="color">

        <div class="black"></div>
