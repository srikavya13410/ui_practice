<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Page</title>
     <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"
    />
    <style>
body{
    background: linear-gradient(375deg, #1cc7d0, #2ede98);
  display: flex;
  justify-content: center;
  align-items: center;
  width:100%;
  height: 100vh;
    font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
}
.profile img{
      background: linear-gradient(375deg, #1cc7d0, #2ede98);
  display: flex;
height:130px;
width:130px;
object-fit:cover;
border-radius:50%;

}
.card{
    background-color: white;
      display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  padding:30px;
  padding-top: 50px;
  padding-bottom: 50px ;
  border-radius: 10px;
}
.name{
    font-size: 30px;
    font-weight: 600;
}
.desc{
    font-size: 17px;
width:250px;
text-align: center;
}
ul{
  margin-right:30px;  
}
ul a{
  background: linear-gradient(375deg, #1cc7d0, #2ede98);
 color:white;
 padding:7px;
 border-radius: 50%;
 margin-right: 5px;
}
ul a i{
    font-size: 19px;
}

    </style>
</head>
<body>

    <div class="card">
<div class="profile">
    <img src="official.png" alt="">
</div>
<div class="name">Nuka Sri Kavya</div>
<div class="desc">User interface designer and
front-end developer</div>
<ul >
        <a href="#"><i class="fab fa-facebook"></i></a>
        <a href="#"><i class="fab fa-twitter"></i></a>
        <a href="#"><i class="fab fa-instagram"></i></a>
        <a href="#"><i class="fab fa-youtube"></i></a>
      </ul>
 </div>

</body>
</html>
