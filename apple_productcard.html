<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    
    <!-- Makes site responsive on mobile -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>My Page</title>
    <style>
.root{
    width:100%;
    height:100vh;
    background-color: green;
    display:flex;
    align-items:center;
    justify-content: center;
    font-family:Raleway,sans-serif;
    box-shadow: 0px 0px 20px -10px black;
}
.product{
    width:600px;
    height:600px;
background-color: white;
        display:flex;
        gap:2px;
        border-radius: 10px;
}
.left{
   
    width:45%;
    height:100%;
    position:relative;
}
.right{
     
    width:55%;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding:30px;
}
.sec1{
   margin-top: 50px; 
}
.del{
    font-size:22px;
    font-weight:800;
    color:rgb(87,84,84);
}
.cod{
    font-size: 11px;
    color:rgb(117,1155,115);
}
.symbol{
    font-size: 20px;
    color: red;
}
.price{
    font-size: 55px;
color:red;
}
.images img{
    width:30px;
    border:1px solid black;
    margin-right:10px;

}
.ben{
    font-size:12px;
    font-weight: 600;
    color:rgb(129,125,125)
}
.color{
    display: flex;
    flex-direction: column;
gap:15px;
}
.cart{
    background-color: red;
    border:0;
    width:180px;
    height:50px;
    color:white;
    font-weight: 600;
    letter-spacing: 1px;
    border-radius: 8px;
   margin-bottom: 20px;
    box-shadow:0px 0px 25px -10px black;
}
.ul1{
    font-size:13px;
}
.left1{
    position: absolute;
width:270px;   
height:450px;
background-color: greenyellow; 
top:60px;
left:-50px;
border-radius: 10px;
box-shadow: 0px 0px 20px -10px black;
}
.left1 img{
    width:300px;
    position:absoulte;
    left:-50px;
    top:50px;
}
    </style>
</head>
<body>

    <div class="root">

<div class="product">
<div class="left">
<div class="left1">
    <img src="green-apple-with-slice.png" alt="">
</div>

</div>
<div class="right">

<div class="sec1">
    <span class="del">Delicious Apples</span><br>
    <span class="cod">COD:45999</span>
</div>

<div class="cost">
    <span class="symbol">RS</span>
    <span class="price">7.93</span>
</div>

<div class="color">
    <span class="ben">SELECT A COLOR</span>
   <div class="images">
    <img src="green-apple2.png" alt="">
   <img src="yellow-apple.png" alt="">
   <img src="orange-apple.png" alt="">
   <img src="red-apple.png" alt="">
</div>
</div>

<div class="benefits">
<span class="ben">BENEFITS</span>
<ul class="ul1">
<li>Apples are nutricious</li>
<li>Apples may be good for weight loss</li>
<li>Apples may be good for bone health</li>
<li>They're linked to a lowest risk of disease</li>

</ul>
</div>

<button class="cart">ADD TO CART</button>

</div>
</div>

    </div>
    

</body>
</html>
